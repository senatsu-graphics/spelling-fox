<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Spelling Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <h1>Audio Spelling Quiz</h1>

    <!-- ❤️ HP表示 -->
    <div id="hearts" class="hearts">
      <img id="heart1" src="images/Heart-black.png">
      <img id="heart2" src="images/Heart-black.png">
      <img id="heart3" src="images/Heart-black.png">
    </div>

    <img id="stateImage" src="images/idle.png" />

    <button id="playAudioBtn">🔊 Play</button>

    <form id="quizForm">
      <input id="answerInput" placeholder="Type the word" />
      <button type="submit">Check</button>
    </form>

    <p id="result"></p>
    <p id="score"></p>

    <div id="endButtons" style="display:none;">
      <button id="reviewBtn">Review</button>
      <button id="restartBtn">Restart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
