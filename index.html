<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spelling Fox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <h1>Spelling Fox</h1>

    <!-- User Name -->
    <div class="player-box">
      <label for="playerNameInput" class="player-label">User Name</label>
      <input
        id="playerNameInput"
        type="text"
        placeholder="Enter your name"
        maxlength="20"
        autocomplete="off"
      >
    </div>

    <!-- Hearts -->
    <div id="hearts" class="hearts">
      <img id="heart1" src="images/Heart-black.png" alt="heart">
      <img id="heart2" src="images/Heart-black.png" alt="heart">
      <img id="heart3" src="images/Heart-black.png" alt="heart">
    </div>

    <!-- Timer Bar -->
    <div class="timer-bar-wrap">
      <div id="timerBar" class="timer-bar"></div>
    </div>

    <!-- Character -->
    <img id="stateImage" src="images/idle.png" alt="Quiz character">

    <!-- Hint -->
    <p id="hint"></p>

    <!-- Quiz Form -->
    <form id="quizForm">
      <!-- Incorrect Feedback -->
      <div id="feedbackBox" class="feedback-box" style="display: none;">
        <p class="feedback-label">Correct answer</p>
        <p id="correctAnswerText" class="correct-answer-text"></p>

        <div id="compareBox" class="compare-box" style="display: none;">
          <div class="compare-row">
            <span class="compare-title">Yours:</span>
            <span id="userCompare" class="compare-text"></span>
          </div>
          <div class="compare-row">
            <span class="compare-title">Correct:</span>
            <span id="correctCompare" class="compare-text"></span>
          </div>
        </div>
      </div>

      <!-- Answer Input -->
      <input
        id="answerInput"
        type="text"
        placeholder="Type the word you hear"
        autocomplete="off"
      >

      <!-- Buttons -->
      <div class="button-row">
        <button id="playAudioBtn" type="button">🔊 Play</button>
        <button id="checkBtn" type="submit">Enter</button>
        <button id="shareBtn" type="button">🦊Share on X</button>
      </div>
    </form>

    <!-- Result -->
    <p id="result"></p>
    <p id="playCountText"></p>

    <!-- Summary -->
    <div id="summaryBox" class="summary-box" style="display: none;">
      <p><strong>User:</strong> <span id="summaryUserName"></span></p>
      <p><strong>Score:</strong> <span id="summaryScore"></span></p>
      <p><strong>Best Score:</strong> <span id="summaryBestScore"></span></p>

      <div class="history-box">
        <p><strong>Today's Results</strong></p>
        <ol id="todayHistoryList"></ol>
      </div>
    </div>

    <!-- End Buttons -->
    <div id="endButtons" style="display: none;">
      <button id="reviewBtn" type="button">Review Mistakes</button>
      <button id="restartBtn" type="button">Restart All</button>
    </div>

    <!-- Shortcut -->
    <p class="shortcut-hint">
      Keyboard Shortcuts: Space = Play / Enter = Check
    </p>

    <!-- Copyright -->
    <p class="copyright">
    Senatsu Graphics © <span id="currentYear"></span> All rights reserved.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
