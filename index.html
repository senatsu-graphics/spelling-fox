<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Spelling Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <h1>Audio Spelling Quiz</h1>

    <img id="stateImage" src="images/idle.png" alt="Quiz character" />

    <p id="hint"></p>

    <button id="playAudioBtn" type="button">🔊 Play</button>

    <form id="quizForm">
      <input
        type="text"
        id="answerInput"
        placeholder="Type the word"
        autocomplete="off"
      />

      <div class="button-row">
        <button id="checkBtn" type="submit">Check</button>
      </div>
    </form>

    <p id="result"></p>
    <p id="score"></p>
    <p id="playCountText"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
