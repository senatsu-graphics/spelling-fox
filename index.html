<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio Spelling Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="quiz-container">
    <h1>Audio Spelling Quiz</h1>

    <!-- ❤️ ハート -->
    <div id="hearts" class="hearts">
      <img id="heart1" src="images/Heart-black.png" alt="heart">
      <img id="heart2" src="images/Heart-black.png" alt="heart">
      <img id="heart3" src="images/Heart-black.png" alt="heart">
    </div>

    <!-- キャラクター画像 -->
    <img id="stateImage" src="images/idle.png" alt="Quiz character">

    <!-- ヒント -->
    <p id="hint"></p>

    <!-- 入力フォーム -->
    <form id="quizForm">
      <!-- 不正解フィードバック -->
      <div id="feedbackBox" class="feedback-box" style="display: none;">
        <p class="feedback-label">Correct answer</p>
        <p id="correctAnswerText" class="correct-answer-text"></p>

        <div id="compareBox" class="compare-box" style="display: none;">
          <div class="compare-row">
            <span class="compare-title">Yours:</span>
            <span id="userCompare" class="compare-text"></span>
          </div>
          <div class="compare-row">
            <span class="compare-title">Correct:</span>
            <span id="correctCompare" class="compare-text"></span>
          </div>
        </div>
      </div>

      <!-- 入力欄 -->
      <input
        id="answerInput"
        type="text"
        placeholder="Type the word"
        autocomplete="off"
      >

      <!-- ボタン -->
      <div class="button-row">
        <button id="playAudioBtn" type="button">🔊 Play</button>
        <button id="checkBtn" type="submit">Enter</button>
      </div>
    </form>

    <!-- 結果 -->
    <p id="result"></p>
    <p id="score"></p>
    <p id="playCountText"></p>

    <!-- 終了時 -->
    <div id="endButtons" style="display: none;">
      <button id="reviewBtn" type="button">Review Mistakes</button>
      <button id="restartBtn" type="button">Restart All</button>
    </div>

    <!-- 🎯 ショートカット -->
    <p class="shortcut-hint">
       Space: Play Audio　/　Enter: Check　/　Next: Skip
    </p>

    <!-- 🎯 コピーライト -->
    <p class="copyright">
      © Senatsu-Graphics
    </p>

  </div>

  <script src="script.js"></script>
</body>
</html>
